name: update-and-deploy

# Refresh prices weekly (and on manual trigger), rebuild the static page,
# commit the refreshed data, and publish site/ to GitHub Pages.
on:
  schedule:
    - cron: "0 3 * * 1"        # every Monday 03:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: agentcost-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Refresh prices (OpenRouter for LLMs; validate GPUs)
        run: |
          python fetch/fetch_llm.py
          python fetch/fetch_gpu.py
      - name: Rebuild static page
        run: python build.py
      - name: Commit refreshed data
        run: |
          git config user.name "agentcost-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ site/
          git commit -m "chore: weekly price refresh" || echo "no changes"
          git push || echo "nothing to push"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
