function renderCalc3(){
  const tokDay=(+el('reqday').value||0)*(+el('avgtok').value||1);
  const model=DATA.selfhost_models[+el('shmodel').value||0];
  const quant=model.quants[+el('shquant').value||0];
  const gpu=DATA.gpus[+el('shgpu').value||0];
  const amortY=+el('amort').value||3;
  const elecUSD=(+el('elec').value||0.7)/FX;
  const ov=(DATA.defaults&&DATA.defaults.server_overhead)||1.3;
  const pue=(DATA.defaults&&DATA.defaults.pue)||1.35;
  // GPUs to fit VRAM, throughput scaled from the model's reference config
  const nPer=Math.max(1,Math.ceil(quant.vram_gb/gpu.vram_gb));
  const refg=gpuByName(model.ref_gpu)||gpu;
  const refPerf=model.ref_n*refg.perf*effPerf(model.ref_n);
  const tput=model.tok_s_ref*((nPer*gpu.perf*effPerf(nPer))/refPerf);
  const reps=Math.max(1,Math.ceil(tokDay/(tput*86400)));
  const nTot=nPer*reps, tputTot=tput*reps;
  // monthly costs (USD)
  const cloudMo=nTot*gpu.cloud_hr*HRS;
  const capex=nTot*gpu.buy_usd*ov;
  const buyMo=capex/(amortY*12) + nTot*gpu.power_w/1000*pue*HRS*elecUSD;
  const api=DATA.api_models.map(m=>({...m,b:blended(m)})).sort((a,b)=>a.b-b.b)[0];
  const apiMo=tokDay*30*api.b/1e6;
  const beMonths=(cloudMo>buyMo-capex/(amortY*12))?capex/(cloudMo-(buyMo-capex/(amortY*12))):Infinity;
  const cur=curMul(),sym=S.cur==='CNY'?'¥':'$';
  const p10=mo=>{const v=(tokDay>0?mo/(tokDay*30/1e4):0)*cur;return sym+(v>=1?v.toFixed(2):v.toFixed(3))};
  el('cfgline').innerHTML=`<b>${model.name}</b> · ${quant.q} · ${t('显存','VRAM')} ${quant.vram_gb}GB → <b>${gpu.gpu}×${nTot}</b>${reps>1?` (${reps}${t('副本','rep')}×${nPer})`:''} · ≈${Math.round(tputTot).toLocaleString()} tok/s${t('(估算)','(est.)')} · ${t('质量','quality')} ${quant.quality}`;
  const RC=(lab,mo,sub)=>`<div class="rc"><div class="lab">${lab}</div><div class="v">${moneyAbs(mo)}<span style="font-size:13px;color:var(--mut)">/${t('月','mo')}</span></div><div class="s">${sub}</div></div>`;
  const mode=S.shMode;let cards='';const opts=[];
  if(mode!=='buy'){cards+=RC(t('租云算力','Rent cloud')+` ${gpu.gpu}×${nTot}`,cloudMo,`${t('有效','eff.')} ${p10(cloudMo)}/${t('万','10k')} · ${t('按需无前期','pay-as-go')}`);opts.push([t('租云','renting'),cloudMo,'']);}
  if(mode!=='cloud'){cards+=RC(t('自购设备','Buy')+` ${gpu.gpu}×${nTot}`,buyMo,`${t('前期','upfront')} ${moneyAbs(capex)} · ${t('摊销','amort')}+${t('电费','power')} · ${isFinite(beMonths)?Math.ceil(beMonths)+t('月摊平租云','mo vs cloud'):'—'}`);opts.push([t('自购','buying'),buyMo,'']);}
  cards+=RC(t('最便宜 API','Cheapest API')+` ${api.model}`,apiMo,`${money(perWan(api.b))}/${t('万','10k')} · ${t('零运维','no ops')}`);opts.push([t('用 API','using API'),apiMo,'api']);
  opts.sort((a,b)=>a[1]-b[1]);const best=opts[0];
  let msg=t(`这个用量下，${best[0]}最省（约 ${moneyAbs(best[1])}/月）。`,`At this volume, ${best[0]} is cheapest (~${moneyAbs(best[1])}/mo).`);
  if((mode==='buy'||mode==='both')&&isFinite(beMonths))msg+=t(` 自购约 ${Math.ceil(beMonths)} 个月摊平租云。`,` Buying breaks even vs cloud in ~${Math.ceil(beMonths)} mo.`);
  el('res3').innerHTML=`<div style="font-size:13.5px;color:var(--soft);margin-bottom:4px">${t('你的用量','Volume')}: <b style="color:var(--ink)">${tokDay.toLocaleString()}</b> token/${t('天','day')} ≈ ${(tokDay*30/1e6).toFixed(1)}M/${t('月','mo')}</div><div class="rescards">${cards}</div><div class="rec ${best[2]}">${msg}</div>`;
}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===b));
  document.querySelectorAll('.view').forEach(v=>{v.hidden=(v.id!=='view'+b.dataset.v)});
});
document.querySelectorAll('#seg-lang button').forEach(b=>b.onclick=()=>{S.lang=b.dataset.l;render()});
document.querySelectorAll('#seg-cur button').forEach(b=>b.onclick=()=>{S.cur=b.dataset.c;render()});
el('mix').oninput=e=>{S.mix=+e.target.value;render()};
['reqday','avgtok','amort','elec'].forEach(id=>el(id).oninput=renderCalc3);
el('shmodel').onchange=()=>{el('shquant').value='0';populateL3();renderCalc3()};
['shquant','shgpu'].forEach(id=>el(id).onchange=renderCalc3);
render();
</script>
