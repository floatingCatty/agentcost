<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&display=swap');
@import url('https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css');
#ac{--paper:#FBF7F0;--card:#FFFFFF;--ink:#5C5248;--soft:#7C7064;--mut:#A89C8C;--line:#ECE3D5;--accent:#C27C58;--accent-bg:#F6ECE3;--sage:#7E9A82;--sage-bg:#EAF1EA;--blue:#6F90B0;--blue-bg:#EAF0F6;--gold:#C9A24B;
  font-family:"LXGW WenKai","Noto Sans SC",-apple-system,sans-serif;color:var(--ink);background:var(--paper);
  max-width:820px;margin:0 auto;padding:26px 22px 48px;line-height:1.8;-webkit-font-smoothing:antialiased}
#ac .num,#ac input,#ac select,#ac .seg button{font-family:"Noto Sans SC",sans-serif}
#ac .head{display:flex;align-items:center;gap:12px}
#ac h1{font-size:27px;font-weight:500;margin:0;color:#4E443A;letter-spacing:.5px}
#ac .sub{color:var(--soft);font-size:14.5px;margin:3px 0 0}
#ac .squig{display:block;margin:6px 0 18px}
#ac .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
#ac .seg{display:inline-flex;border:1.5px solid var(--line);border-radius:22px;overflow:hidden;background:var(--card)}
#ac .seg button{background:transparent;color:var(--mut);border:0;padding:6px 14px;font-size:13px;cursor:pointer;transition:.15s}
#ac .seg button.on{background:var(--accent);color:#fff}
#ac .asof{color:var(--mut);font-size:12px}
#ac .tabs{display:flex;gap:4px;border-bottom:1.5px solid var(--line);margin:18px 0 20px}
#ac .tab{font-family:"LXGW WenKai","Noto Sans SC",sans-serif;background:transparent;border:0;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;padding:9px 16px;font-size:16px;color:var(--mut);cursor:pointer;transition:.18s}
#ac .tab:hover{color:var(--ink)}
#ac .tab.on{color:var(--accent);border-bottom-color:var(--accent)}
#ac .view{animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
#ac .vh{font-size:19px;color:#4E443A;margin:0 0 3px}
#ac .vsub{color:var(--soft);font-size:13.5px;margin-bottom:8px}
#ac .lvl{font-size:12px;color:var(--mut);margin-left:8px}
#ac .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));gap:13px;margin-top:14px}
#ac .card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;transition:transform .13s ease,box-shadow .13s ease}
#ac .card:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(160,130,90,.13)}
#ac .card .nm{font-weight:500;color:#5A5046}
#ac .card .nm a{color:#4E443A;text-decoration:none;border-bottom:1px dotted var(--mut)}
#ac .card .nm a:hover{color:var(--accent);border-color:var(--accent)}
#ac .vmark{font-size:11px;color:var(--mut)}
#ac .vmark.ok{color:var(--sage)}
#ac .agentline{font-size:11.5px;color:#496684;background:#EEF3F8;border:1px solid #DCE6F0;border-radius:8px;padding:3px 8px;margin-top:6px}
#ac td a{color:var(--ink);text-decoration:none;border-bottom:1px dotted var(--mut)}
#ac td a:hover{color:var(--accent)}
#ac .foot a{border-bottom:1px dotted var(--accent)}
#ac .card .pr{font-size:23px;color:var(--accent);margin:3px 0}
#ac .card .gets{font-size:12.5px;color:var(--soft);line-height:1.65}
#ac .pill{display:inline-block;font-size:11.5px;padding:1px 10px;border-radius:12px;background:#F4ECDF;border:1px solid var(--line);color:var(--soft);margin-top:3px}
#ac .pill.top{background:var(--sage-bg);border-color:#D2E0D2;color:#5E7E63}
#ac table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:8px}
#ac th,#ac td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
#ac th{color:var(--mut);font-weight:400;cursor:pointer;user-select:none}
#ac tr:hover td{background:#FBF7EF}
#ac td.num,#ac th.num{text-align:right;font-variant-numeric:tabular-nums}
#ac .big{color:var(--accent);font-weight:500}
#ac .open{color:var(--sage)} #ac .closed{color:var(--mut)}
#ac .ctl{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:13.5px;color:var(--soft);margin:10px 0 2px}
#ac input[type=range]{accent-color:var(--accent)}
#ac input[type=number],#ac select{background:var(--card);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:6px 10px;font-size:13.5px}
#ac input:focus,#ac select:focus{outline:none;border-color:var(--accent)}
#ac .cfgline{margin-top:12px;font-size:12.5px;color:var(--soft);background:#FBF3E8;border:1px solid var(--line);border-radius:10px;padding:8px 12px}
#ac .res{margin-top:14px}
#ac .rescards{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:10px}
#ac .rc{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:13px 15px}
#ac .rc .lab{font-size:12.5px;color:var(--mut)}
#ac .rc .v{font-size:22px;color:var(--accent);margin-top:2px}
#ac .rc .s{font-size:12px;color:var(--soft);margin-top:2px}
#ac .rec{border-radius:14px;padding:12px 15px;margin-top:14px;font-size:14px;background:var(--sage-bg);border:1.5px solid #CBDDCB;color:#4F6B52}
#ac .rec.api{background:var(--blue-bg);border-color:#C6D6E6;color:#456480}
#ac .muted{color:var(--mut);font-size:12.5px}
#ac .foot{color:var(--mut);font-size:11.5px;margin-top:14px;line-height:1.65}
#ac a{color:var(--accent)}
</style>

<script>
const DATA = __DATA__;
const S = {lang:'zh', cur:'CNY', mix:75, shMode:'both'};
const FX = DATA.fx_usd_cny || 7.2;
const HRS = 730;
function gpuByName(n){return DATA.gpus.find(g=>g.gpu===n)}
function effPerf(n){return n<=1?1:1/(1+0.15*(n-1))}
function curMul(){return S.cur==='CNY'?FX:1}
function fillSel(sel,items,fmt){const cur=sel.value;sel.innerHTML='';items.forEach((it,i)=>{const o=document.createElement('option');o.value=i;o.textContent=fmt(it,i);sel.appendChild(o)});if(cur!==''&&+cur<items.length)sel.value=cur}
function t(zh,en){return S.lang==='zh'?zh:en}
function perWan(usd1m){let v=usd1m/100; if(S.cur==='CNY')v*=FX; return v}
function money(v){const sym=S.cur==='CNY'?'ВҘ':'$';return sym+(v>=100?v.toFixed(0):v>=1?v.toFixed(2):v.toFixed(3))}
function moneyAbs(usd){let v=usd; if(S.cur==='CNY')v*=FX; const sym=S.cur==='CNY'?'ВҘ':'$';return sym+v.toLocaleString(undefined,{maximumFractionDigits:0})}
function blended(m){const s=S.mix/100;return m.in*s+m.out*(1-s)}
function el(id){return document.getElementById(id)}
function setT(id,zh,en){const e=el(id);if(e)e.textContent=t(zh,en)}

const USE=[['daily','ж—Ҙеёё/еҶҷдҪң','Everyday'],['code','зј–зЁӢ','Coding'],['doc','й•ҝж–ҮжЎЈ/еӨ§дёҠдёӢж–Ү','Long docs']];
const BUD=[['free','е…Қиҙ№','Free'],['lo','вүӨВҘ150/жңҲ','вүӨ$20/mo'],['any','дёҚйҷҗ','Any']];
const MODES=[['both','дёӨиҖ…еҜ№жҜ”','Compare'],['cloud','з§ҹдә‘з®—еҠӣ','Rent cloud'],['buy','иҮӘиҙӯи®ҫеӨҮ','Buy hardware']];
const PROV_EN={'еӯ—иҠӮ':'ByteDance','жңҲд№Ӣжҡ—йқў':'Moonshot','йҳҝйҮҢ':'Alibaba','жҷәи°ұ':'Zhipu','зҷҫеәҰ':'Baidu','и…ҫи®Ҝ':'Tencent','и®ҜйЈһ':'iFlytek','йҳ¶и·ғ':'StepFun'};
const QUAL_EN={'йЎ¶':'top','й«ҳ':'high','дёӯ':'mid'};
const API_SRC={'OpenAI':'https://openai.com/api/pricing/','Anthropic':'https://claude.com/pricing#api','Google':'https://ai.google.dev/gemini-api/docs/pricing','xAI':'https://x.ai/api','DeepSeek':'https://api-docs.deepseek.com/quick_start/pricing','йҳҝйҮҢ':'https://help.aliyun.com/zh/model-studio/models','жҷәи°ұ':'https://open.bigmodel.cn/pricing','жңҲд№Ӣжҡ—йқў':'https://platform.moonshot.cn/docs/pricing/chat'};
function link(url,txt){return url?`<a href="${url}" target="_blank" rel="noopener">${txt}</a>`:txt}
function prov(p){return S.lang==='en'?(PROV_EN[p]||p):p}
function qual(q){return S.lang==='en'?(QUAL_EN[q]||q):q}
function bestforT(p){return S.lang==='en'?(p.best_for_en||p.best_for):p.best_for}
function getsT(p){return S.lang==='en'?(p.gets_en||p.gets):p.gets}
let useSel='daily', budSel='any';

function gpuPrice(base){let best=null;for(const g of DATA.gpus){if(g.gpu===base&&(best===null||g.usd_hr<best))best=g.usd_hr}return best}
function configHr(row){const m=row.gpu.match(/^(\d+)[Г—x](.+)$/);const n=m?+m[1]:1;const base=m?m[2]:row.gpu;const p=gpuPrice(base);return p?n*p:null}

function render(){
  document.querySelectorAll('#seg-lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===S.lang));
  document.querySelectorAll('#seg-cur button').forEach(b=>b.classList.toggle('on',b.dataset.c===S.cur));
  el('t-title').textContent=t('AI еҲ°еә•иҰҒиҠұеӨҡе°‘й’ұпјҹ','What does AI cost?');
  el('t-sub').textContent=t('и®ўйҳ…гҖҒAPIгҖҒиҮӘе·ұз§ҹеҚЎйғЁзҪІпјҢе…ЁжҠҳз®—жҲҗгҖҢе…ғ / дёҮ tokenгҖҚдёҖдёӘеҸЈеҫ„гҖӮ','Plans, APIs and self-hosting in one unit: cost per 10k tokens.');
  el('t-asof').textContent=t('ж•°жҚ® ','data ')+DATA.as_of.split('В·')[0].trim();
  setT('t-tab1','в‘  йҖү AI еҠ©жүӢ','в‘  Pick AI');
  setT('t-tab2','в‘Ў API жҜ”д»·','в‘Ў API prices');
  setT('t-tab3','в‘ў иҮӘйғЁзҪІз®—иҙҰ','в‘ў Self-host');
  el('t-s1h').textContent=t('жҲ‘е°ұжғіз”Ё AIпјҢйҖүе“ӘдёӘпјҹ','Which AI should I use?');
  el('t-s1sub').textContent=t('з»ҷйқһжҠҖжңҜжңӢеҸӢпјҡжҢүз”ЁйҖ”е’Ңйў„з®—пјҢзӣҙжҺҘз»ҷжҺЁиҚҗгҖӮ','Pick by use-case & budget.');
  el('t-use').textContent=t('з”ЁйҖ”пјҡ','Use: ');el('t-bud').textContent=t('йў„з®—пјҡ','Budget: ');
  el('t-s2h').textContent=t('API д»·ж јеҜ№жҜ”пјҲе…ғ/дёҮ tokenпјү','API price compare (per 10k tokens)');
  el('t-s2lvl').textContent=t('зӮ№иЎЁеӨҙеҸҜжҺ’еәҸ','click headers to sort');
  el('t-s3h').textContent=t('иҮӘйғЁзҪІ vs APIпјҢе“ӘдёӘжӣҙзңҒпјҹ','Self-host vs API: which is cheaper?');
  el('t-s3lvl').textContent=t('дә‘з§ҹ / иҮӘиҙӯ В· еҗ«йҮҸеҢ–дёҺеӣһжң¬','cloud / buy В· quant & payback');
  el('t-s3sub').textContent=t('йҖүжЁЎеһӢгҖҒйҮҸеҢ–гҖҒжҳҫеҚЎ вҶ’ иҮӘеҠЁз®—еҮәдә‘з§ҹ / иҮӘиҙӯ / API дёүз§Қж–№жЎҲзҡ„жңҲжҲҗжң¬гҖҒжҳҫеҚЎйңҖжұӮдёҺеӣһжң¬зӮ№гҖӮ','Pick model, quant & GPU вҶ’ monthly cost + GPU needs + payback for rent vs buy vs API.');
  el('t-vol').textContent=t('з”ЁйҮҸпјҡжҜҸеӨ©','Per day');el('t-reqs').textContent=t('ж¬ЎиҜ·жұӮ Г—','requests Г—');el('t-toks').textContent=t('token/ж¬Ў','tokens/req');
  el('t-model').textContent=t('жЁЎеһӢпјҡ','Model: ');el('t-quant').textContent=t('йҮҸеҢ–пјҡ','Quant: ');el('t-gpu').textContent=t('жҳҫеҚЎпјҡ','GPU: ');el('t-mix').textContent=t('иҫ“е…ҘеҚ жҜ”','Input share');
  el('t-adv').textContent=t('в–ё й«ҳзә§еҒҮи®ҫпјҲз”өд»· / ж‘Ҡй”Җе№ҙйҷҗпјү','в–ё Assumptions (electricity / amortization)');
  el('t-amort').textContent=t('ж‘Ҡй”Җ','Amortize ');el('t-amortu').textContent=t('е№ҙ','yr');el('t-elec').textContent=t('з”өд»·','Electricity ');el('t-elecu').textContent=t('ВҘ/еәҰ','ВҘ/kWh');
  buildSeg('seg-mode',MODES.map(m=>[m[0],t(m[1],m[2])]),S.shMode,v=>{S.shMode=v;render()});
  const orLink=link('https://openrouter.ai/models','OpenRouter вҶ—'), gdLink=link((DATA.defaults&&DATA.defaults.cloud_src)||'#','getdeploying вҶ—'), subLink=link(DATA.sub_src||'#','aipricing.guru вҶ—');
  el('t-disc').innerHTML=t(`ж•°жҚ®жқҘжәҗпјҡAPI д»·ж јз»Ҹ ${orLink} жҜҸе‘ЁиҮӘеҠЁеҲ·ж–°пјӣдә‘ GPU д»· ${gdLink}пјӣи®ўйҳ…д»·дәӨеҸүж ёеҜ№иҮӘ ${subLink}пјҲвң“=е·Іж ёеҜ№пјҢ~=дј°и®ЎпјҢзӮ№дә§е“ҒеҗҚиҝӣе®ҳзҪ‘йҮҮиҙӯ/ж ёеҜ№пјүгҖӮж•°еӯ—йҡҸж—¶еҸҳеҠЁгҖҒйғЁеҲҶдёәдј°и®ЎгҖӮжң¬е·Ҙе…·ејҖжәҗгҖӮ`,`Sources: API via ${orLink} (weekly auto-refresh); cloud GPU via ${gdLink}; subscriptions cross-checked vs ${subLink} (вң“=checked, ~=estimate; click a name to buy/verify). Estimates, change often. Open-source.`);
  el('t-s2foot').innerHTML=t(`з»јеҗҲд»· = иҫ“е…Ҙд»·Г—еҚ жҜ” + иҫ“еҮәд»·Г—(1вҲ’еҚ жҜ”)гҖӮз»ҝиүІ = ејҖжәҗжқғйҮҚгҖӮд»·ж јжқҘжәҗ ${orLink}пјҢзӮ№жЁЎеһӢеҗҚиҝӣеҺӮе•Ҷе®ҡд»·йЎөгҖӮ`,`blended = inГ—share + outГ—(1вҲ’share). Green = open weights. Source ${orLink}; click a model for the vendor page.`);
  const buyLink=link((DATA.defaults&&DATA.defaults.buy_src)||'#','gpucost.org вҶ—');
  el('t-s3foot').innerHTML=t(`з®ҖеҢ–жЁЎеһӢпјҡиҮӘиҙӯйңҖз§ҹи¶іеӨҹеҚЎж»Ўи¶іеҗһеҗҗпјӣеҝҪз•ҘеҶ·еҗҜеҠЁ/иҝҗз»ҙгҖӮдә‘д»·жқҘжәҗ ${gdLink}пјӣиҙӯд№°д»·жқҘжәҗ ${buyLink}пјҲ${(DATA.defaults&&DATA.defaults.buy_note)||'еёӮеңәдј°д»·'}пјүгҖӮ`,`Simplified; ignores ops. Cloud price ${gdLink}; buy price ${buyLink} (market estimate).`);
  buildSeg('seg-use',USE.map(u=>[u[0],t(u[1],u[2])]),useSel,v=>{useSel=v;render()});
  buildSeg('seg-bud',BUD.map(b=>[b[0],t(b[1],b[2])]),budSel,v=>{budSel=v;render()});
  el('mixv').textContent=t(`иҫ“е…Ҙ ${S.mix}% / иҫ“еҮә ${100-S.mix}%`,`in ${S.mix}% / out ${100-S.mix}%`);
  renderCards();renderTable();populateL3();renderCalc3();
}
function buildSeg(id,items,sel,cb){const c=el(id);c.innerHTML='';items.forEach(([v,label])=>{const b=document.createElement('button');b.textContent=label;b.className=v===sel?'on':'';b.onclick=()=>cb(v);c.appendChild(b)})}

function renderCards(){
  let list=DATA.consumer_plans.slice();
  if(budSel==='free')list=list.filter(p=>p.usd_mo===0);
  else if(budSel==='lo')list=list.filter(p=>p.usd_mo<=20);
  list=list.filter(p=>(p.tags||[]).includes(useSel));
  const rank={'йЎ¶':3,'й«ҳ':2,'дёӯ':1};
  list.sort((a,b)=>(rank[b.quality]-rank[a.quality])||(a.usd_mo-b.usd_mo));
  const c=el('cards1');c.innerHTML='';
  list.slice(0,12).forEach(p=>{const d=document.createElement('div');d.className='card';
    const note=p.note?` <span class="muted">В· ${p.note}</span>`:'';
    const vm=p.verified==='x'?` <span class="vmark ok" title="${t('д»·ж је·Із¬¬дёүж–№дәӨеҸүж ёеҜ№','cross-checked')}">вң“</span>`:` <span class="vmark" title="${t('дј°и®ЎпјҢзӮ№еҗҚз§°д»Ҙе®ҳзҪ‘дёәеҮҶ','estimate; click name to verify')}">~</span>`;
    d.innerHTML=`<div class="nm">${link(p.source,p.name)}${vm} <span class="muted">${prov(p.provider)}</span></div>
      <div class="pr">${p.usd_mo===0?(p.note?t('е…Қиҙ№иө·','Free+'):t('е…Қиҙ№','Free')):moneyAbs(p.usd_mo)+t('/жңҲ','/mo')}${note}</div>
      <div class="gets">${getsT(p)}</div>
      <div style="margin-top:6px"><span class="pill ${p.quality==='йЎ¶'?'top':''}">${t('иғҪеҠӣ','cap')}:${qual(p.quality)}</span> <span class="pill">${bestforT(p)}</span></div>`;
    c.appendChild(d)});
  if(!list.length)c.innerHTML=`<div class="muted">${t('жІЎжңүеҢ№й…ҚйЎ№пјҢж”ҫе®Ҫйў„з®—иҜ•иҜ•гҖӮ','No match, widen budget.')}</div>`;
}

let sort2={k:'blended',asc:true};
function renderTable(){
  const rows=DATA.api_models.map(m=>({...m,blended:blended(m)}));
  const cols=[['model',t('жЁЎеһӢ','Model'),0],['blended',t('з»јеҗҲ е…ғ/дёҮ','blended'),1],['in',t('иҫ“е…Ҙ','in'),1],['out',t('иҫ“еҮә','out'),1],['ctx',t('дёҠдёӢж–Ү','ctx'),1],['quality',t('иғҪеҠӣ','cap'),0],['weights',t('жқғйҮҚ','wt'),0]];
  rows.sort((a,b)=>{const v=(typeof a[sort2.k]==='number')?a[sort2.k]-b[sort2.k]:String(a[sort2.k]).localeCompare(b[sort2.k]);return sort2.asc?v:-v});
  let h='<tr>'+cols.map(c=>`<th class="${c[2]?'num':''}" data-k="${c[0]}">${c[1]}</th>`).join('')+'</tr>';
  for(const m of rows){h+=`<tr>
    <td>${link(API_SRC[m.provider],m.model)}<div class="muted">${prov(m.provider)}</div></td>
    <td class="num big">${money(perWan(m.blended))}</td>
    <td class="num">${money(perWan(m.in))}</td>
    <td class="num">${money(perWan(m.out))}</td>
    <td class="num">${Math.round(m.ctx/1000)}k</td>
    <td><span class="pill ${m.quality==='йЎ¶'?'top':''}">${qual(m.quality)}</span></td>
    <td class="${m.weights==='open'?'open':'closed'}">${m.weights==='open'?t('ејҖжәҗ','open'):t('й—ӯжәҗ','closed')}</td></tr>`}
  const tb=el('tbl2');tb.innerHTML=h;
  tb.querySelectorAll('th').forEach(th=>th.onclick=()=>{const k=th.dataset.k;sort2.asc=(sort2.k===k)?!sort2.asc:true;sort2.k=k;renderTable()});
}

function populateL3(){
  fillSel(el('shmodel'),DATA.selfhost_models,m=>m.name);
  const model=DATA.selfhost_models[+el('shmodel').value||0];
  fillSel(el('shquant'),model.quants,q=>`${q.q} В· ${q.vram_gb}GB В· ${q.quality}`);
  fillSel(el('shgpu'),DATA.gpus,g=>`${g.gpu} ${g.vram_gb}GB В· ${t('з§ҹ','rent')}${money(g.cloud_hr*curMul())}/h${g.cloud_provider?'('+g.cloud_provider+')':''} В· ${t('д№°','buy')}${moneyAbs(g.buy_usd)}`);
}
function renderCalc3(){
  const tokDay=(+el('reqday').value||0)*(+el('avgtok').value||1);
  const model=DATA.selfhost_models[+el('shmodel').value||0];
  const quant=model.quants[+el('shquant').value||0];
  const gpu=DATA.gpus[+el('shgpu').value||0];
  const amortY=+el('amort').value||3;
  const elecUSD=(+el('elec').value||0.7)/FX;
  const ov=(DATA.defaults&&DATA.defaults.server_overhead)||1.3;
  const pue=(DATA.defaults&&DATA.defaults.pue)||1.35;
  // GPUs to fit VRAM, throughput scaled from the model's reference config
  const nPer=Math.max(1,Math.ceil(quant.vram_gb/gpu.vram_gb));
  const refg=gpuByName(model.ref_gpu)||gpu;
  const refPerf=model.ref_n*refg.perf*effPerf(model.ref_n);
  const tput=model.tok_s_ref*((nPer*gpu.perf*effPerf(nPer))/refPerf);
  const reps=Math.max(1,Math.ceil(tokDay/(tput*86400)));
  const nTot=nPer*reps, tputTot=tput*reps;
  // monthly costs (USD)
  const cloudMo=nTot*gpu.cloud_hr*HRS;
  const capex=nTot*gpu.buy_usd*ov;
  const buyMo=capex/(amortY*12) + nTot*gpu.power_w/1000*pue*HRS*elecUSD;
  const api=DATA.api_models.map(m=>({...m,b:blended(m)})).sort((a,b)=>a.b-b.b)[0];
  const apiMo=tokDay*30*api.b/1e6;
  const beMonths=(cloudMo>buyMo-capex/(amortY*12))?capex/(cloudMo-(buyMo-capex/(amortY*12))):Infinity;
  const cur=curMul(),sym=S.cur==='CNY'?'ВҘ':'$';
  const p10=mo=>{const v=(tokDay>0?mo/(tokDay*30/1e4):0)*cur;return sym+(v>=1?v.toFixed(2):v.toFixed(3))};
  el('cfgline').innerHTML=`<b>${model.name}</b> В· ${quant.q} В· ${t('жҳҫеӯҳ','VRAM')} ${quant.vram_gb}GB вҶ’ <b>${gpu.gpu}Г—${nTot}</b>${reps>1?` (${reps}${t('еүҜжң¬','rep')}Г—${nPer})`:''} В· вүҲ${Math.round(tputTot).toLocaleString()} tok/s${t('(дј°з®—)','(est.)')} В· ${t('иҙЁйҮҸ','quality')} ${quant.quality}`;
  const RC=(lab,mo,sub)=>`<div class="rc"><div class="lab">${lab}</div><div class="v">${moneyAbs(mo)}<span style="font-size:13px;color:var(--mut)">/${t('жңҲ','mo')}</span></div><div class="s">${sub}</div></div>`;
  const mode=S.shMode;let cards='';const opts=[];
  if(mode!=='buy'){cards+=RC(t('з§ҹдә‘з®—еҠӣ','Rent cloud')+` ${gpu.gpu}Г—${nTot}`,cloudMo,`${t('жңүж•Ҳ','eff.')} ${p10(cloudMo)}/${t('дёҮ','10k')} В· ${t('жҢүйңҖж— еүҚжңҹ','pay-as-go')}`);opts.push([t('з§ҹдә‘','renting'),cloudMo,'']);}
  if(mode!=='cloud'){cards+=RC(t('иҮӘиҙӯи®ҫеӨҮ','Buy')+` ${gpu.gpu}Г—${nTot}`,buyMo,`${t('еүҚжңҹ','upfront')} ${moneyAbs(capex)} В· ${t('ж‘Ҡй”Җ','amort')}+${t('з”өиҙ№','power')} В· ${isFinite(beMonths)?Math.ceil(beMonths)+t('жңҲж‘Ҡе№із§ҹдә‘','mo vs cloud'):'вҖ”'}`);opts.push([t('иҮӘиҙӯ','buying'),buyMo,'']);}
  cards+=RC(t('жңҖдҫҝе®ң API','Cheapest API')+` ${api.model}`,apiMo,`${money(perWan(api.b))}/${t('дёҮ','10k')} В· ${t('йӣ¶иҝҗз»ҙ','no ops')}`);opts.push([t('з”Ё API','using API'),apiMo,'api']);
  opts.sort((a,b)=>a[1]-b[1]);const best=opts[0];
  let msg=t(`иҝҷдёӘз”ЁйҮҸдёӢпјҢ${best[0]}жңҖзңҒпјҲзәҰ ${moneyAbs(best[1])}/жңҲпјүгҖӮ`,`At this volume, ${best[0]} is cheapest (~${moneyAbs(best[1])}/mo).`);
  if((mode==='buy'||mode==='both')&&isFinite(beMonths))msg+=t(` иҮӘиҙӯзәҰ ${Math.ceil(beMonths)} дёӘжңҲж‘Ҡе№із§ҹдә‘гҖӮ`,` Buying breaks even vs cloud in ~${Math.ceil(beMonths)} mo.`);
  el('res3').innerHTML=`<div style="font-size:13.5px;color:var(--soft);margin-bottom:4px">${t('дҪ зҡ„з”ЁйҮҸ','Volume')}: <b style="color:var(--ink)">${tokDay.toLocaleString()}</b> token/${t('еӨ©','day')} вүҲ ${(tokDay*30/1e6).toFixed(1)}M/${t('жңҲ','mo')}</div><div class="rescards">${cards}</div><div class="rec ${best[2]}">${msg}</div>`;
}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===b));
  document.querySelectorAll('.view').forEach(v=>{v.hidden=(v.id!=='view'+b.dataset.v)});
});
document.querySelectorAll('#seg-lang button').forEach(b=>b.onclick=()=>{S.lang=b.dataset.l;render()});
document.querySelectorAll('#seg-cur button').forEach(b=>b.onclick=()=>{S.cur=b.dataset.c;render()});
el('mix').oninput=e=>{S.mix=+e.target.value;render()};
['reqday','avgtok','amort','elec'].forEach(id=>el(id).oninput=renderCalc3);
el('shmodel').onchange=()=>{el('shquant').value='0';populateL3();renderCalc3()};
['shquant','shgpu'].forEach(id=>el(id).onchange=renderCalc3);
render();
</script>
